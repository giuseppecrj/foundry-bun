[tools]
bun = "1.3.14"
foundry = "1.7.1"

[tasks.install]
description = "Install JavaScript dependencies with Bun"
run = "bun install"

[tasks.build]
description = "Build contracts with Forge"
run = "forge build"

[tasks.test]
description = "Run Forge tests"
run = "forge test"

[tasks.fmt]
description = "Format Solidity and project files with Prettier"
run = "bunx prettier --write ."

[tasks.fmt-check]
description = "Check formatting with Prettier"
run = "bunx prettier --check ."

[tasks.check]
description = "Check formatting, build contracts, and run tests"
depends = ["fmt-check", "build", "test"]
